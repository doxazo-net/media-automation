version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/smpr"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "rust"

  - package-ecosystem: "cargo"
    directory: "/rabsody"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "rust"
      - "rabsody"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # init and analyze are the same action pinned twice and must move in
      # lockstep; a single-step bump skews their versions and fails CodeQL.
      codeql-action:
        patterns:
          - "github/codeql-action*"
    labels:
      - "dependencies"
      - "ci"

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
